{% extends "base.html" %}

{% block content %}

<h1>🔊 Text to Speech</h1>

<br>

<textarea
    id="text"
    placeholder="Type in English..."
    style="
        width:100%;
        height:200px;
        font-size:20px;
        padding:15px;
    "
></textarea>

<br><br>

<select id="language">

    <option value="te">Telugu</option>

    <option value="hi">Hindi</option>

    <option value="ta">Tamil</option>

    <option value="en">English</option>

</select>

<br><br>

<button onclick="speakText()">
    Speech
</button>

<span id="tts-status" style="margin-left:12px;color:#333;font-weight:600;"></span>

<div id="tts-spinner" style="display:none;margin-top:12px;">
    <div style="width:28px;height:28px;border:4px solid #ddd;border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite;"></div>
</div>

<style>
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>

<script>

async function speakText(event){
    const text = document.getElementById("text").value || "";
    const language = document.getElementById("language").value || "en";

    const statusEl = document.getElementById('tts-status');
    const spinnerEl = document.getElementById('tts-spinner');

    statusEl.textContent = 'Generating audio...';
    spinnerEl.style.display = 'inline-block';
    const button = event && event.target ? event.target : document.querySelector('button[onclick="speakText()"]');
    if (button) button.disabled = true;

    try {
        const response = await fetch('/speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text, language: language })
        });

        const data = await response.json();

        spinnerEl.style.display = 'none';
        if (button) button.disabled = false;

        if (!response.ok || data.error) {
            const msg = data && data.error ? data.error : 'Failed to generate audio. Please login and try again.';
            statusEl.textContent = msg;
            return;
        }

        let audioUrl = data.audio || '';
        if (audioUrl && audioUrl.startsWith('/')) {
            audioUrl = window.location.origin + audioUrl;
        }

        statusEl.textContent = 'Playing...';
        try {
            const audio = new Audio(audioUrl);
            await audio.play();
            audio.onended = () => { statusEl.textContent = 'Played'; };
        } catch (err) {
            console.error('Audio playback failed', err);
            statusEl.textContent = 'Playback failed in this browser.';
        }

    } catch (err) {
        console.error('Speak request failed', err);
        spinnerEl.style.display = 'none';
        if (button) button.disabled = false;
        statusEl.textContent = 'Request failed. Check console.';
    }
}

</script>

{% endblock %}
